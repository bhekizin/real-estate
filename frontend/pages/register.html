<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RealEstate</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                RealEstate
            </a>
            <div class="nav-links" id="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="properties.html" class="nav-link">Properties</a>
                <a href="compare.html" class="nav-link compare-link">Compare <span class="compare-badge" id="compare-count" style="display:none">0</span></a>
            </div>
            <div class="nav-right" id="nav-auth"></div>
            <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card" style="max-width:520px">
            <h2>Create Account</h2>
            <p class="subtitle">Join RealEstate today</p>
            <div class="alert alert-error" id="register-error"></div>
            <div class="alert alert-success" id="register-success"></div>
            <form id="register-form">
                <div class="form-group">
                    <label>I want to</label>
                    <div class="role-select">
                        <div class="role-option selected" data-role="BUYER" onclick="selectRole(this)">
                            <strong>Buy/Rent</strong><br><small>Browse & inquire</small>
                        </div>
                        <div class="role-option" data-role="AGENT" onclick="selectRole(this)">
                            <strong>List Properties</strong><br><small>I'm an agent</small>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" id="reg-firstname" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" id="reg-lastname" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" id="reg-email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" id="reg-phone" placeholder="(555) 123-4567">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="reg-password" required placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-control" id="reg-confirm" required>
                </div>
                <input type="hidden" id="reg-role" value="BUYER">
                <button type="submit" class="btn btn-primary" style="width:100%" id="register-btn">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
