<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - RealEstate</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                RealEstate
            </a>
            <div class="nav-links" id="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="properties.html" class="nav-link active">Properties</a>
                <a href="compare.html" class="nav-link compare-link">Compare <span class="compare-badge" id="compare-count" style="display:none">0</span></a>
            </div>
            <div class="nav-right" id="nav-auth"></div>
            <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="listings-layout">
            <aside class="filter-sidebar">
                <h3>Filters</h3>
                <form id="filter-form">
                    <div class="form-group">
                        <label>Keyword</label>
                        <input type="text" class="form-control" id="filter-keyword" placeholder="Search...">
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <select class="form-control" id="filter-city">
                            <option value="">All Cities</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Property Type</label>
                        <select class="form-control" id="filter-type">
                            <option value="">All Types</option>
                            <option value="HOUSE">House</option>
                            <option value="APARTMENT">Apartment</option>
                            <option value="CONDO">Condo</option>
                            <option value="TOWNHOUSE">Townhouse</option>
                            <option value="LAND">Land</option>
                            <option value="COMMERCIAL">Commercial</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Min Price</label>
                        <input type="number" class="form-control" id="filter-min-price" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Max Price</label>
                        <input type="number" class="form-control" id="filter-max-price" placeholder="No max">
                    </div>
                    <div class="form-group">
                        <label>Bedrooms</label>
                        <select class="form-control" id="filter-beds">
                            <option value="">Any</option>
                            <option value="1">1+</option>
                            <option value="2">2+</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                            <option value="5">5+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bathrooms</label>
                        <select class="form-control" id="filter-baths">
                            <option value="">Any</option>
                            <option value="1">1+</option>
                            <option value="2">2+</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%">Apply Filters</button>
                    <button type="button" class="btn btn-outline" style="width:100%;margin-top:8px" onclick="clearFilters()">Clear</button>
                </form>
            </aside>

            <main class="listings-content">
                <div class="listings-header">
                    <h2 id="results-count">Properties</h2>
                    <select class="sort-select" id="sort-select">
                        <option value="createdAt,desc">Newest First</option>
                        <option value="price,asc">Price: Low to High</option>
                        <option value="price,desc">Price: High to Low</option>
                    </select>
                </div>
                <div class="property-grid" id="property-grid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <div class="pagination" id="pagination"></div>
            </main>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 RealEstate. All rights reserved.</div>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/properties.js"></script>
</body>
</html>
