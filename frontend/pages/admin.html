<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - RealEstate</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                RealEstate
            </a>
            <div class="nav-links" id="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="properties.html" class="nav-link">Properties</a>
                <a href="compare.html" class="nav-link compare-link">Compare <span class="compare-badge" id="compare-count" style="display:none">0</span></a>
            </div>
            <div class="nav-right" id="nav-auth"></div>
            <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </nav>

    <div class="container dashboard-page">
        <div class="dashboard-header">
            <h1>Admin Panel</h1>
        </div>

        <div class="stats-grid" id="admin-stats">
            <div class="stat-card"><div class="stat-value" id="stat-users">-</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-properties">-</div><div class="stat-label">Properties</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-agents">-</div><div class="stat-label">Agents</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-total-inquiries">-</div><div class="stat-label">Inquiries</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchAdminTab('users')">Users</button>
            <button class="tab-btn" onclick="switchAdminTab('properties')">Properties</button>
        </div>

        <!-- Users Tab -->
        <div class="tab-content active" id="tab-users">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Properties Tab -->
        <div class="tab-content" id="tab-properties">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Agent</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Featured</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-properties-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 RealEstate. All rights reserved.</div>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
