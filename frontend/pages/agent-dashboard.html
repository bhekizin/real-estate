<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - RealEstate</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                RealEstate
            </a>
            <div class="nav-links" id="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="properties.html" class="nav-link">Properties</a>
                <a href="compare.html" class="nav-link compare-link">Compare <span class="compare-badge" id="compare-count" style="display:none">0</span></a>
            </div>
            <div class="nav-right" id="nav-auth"></div>
            <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </nav>

    <div class="container dashboard-page">
        <div class="dashboard-header">
            <h1>Agent Dashboard</h1>
        </div>

        <div class="stats-grid" id="agent-stats">
            <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Listings</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-active">0</div><div class="stat-label">Active</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-sold">0</div><div class="stat-label">Sold</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-inquiries">0</div><div class="stat-label">Inquiries</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('listings')">My Listings</button>
            <button class="tab-btn" onclick="switchTab('add-property')">Add Property</button>
            <button class="tab-btn" onclick="switchTab('inquiries')">Inquiries</button>
        </div>

        <!-- My Listings Tab -->
        <div class="tab-content active" id="tab-listings">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Price</th>
                            <th>City</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listings-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Add Property Tab -->
        <div class="tab-content" id="tab-add-property">
            <div class="property-form">
                <div class="alert alert-error" id="property-error"></div>
                <div class="alert alert-success" id="property-success"></div>
                <form id="add-property-form">
                    <div class="form-section">
                        <h4>Basic Information</h4>
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" class="form-control" id="prop-title" required placeholder="Beautiful 3-bedroom house...">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="prop-description" rows="4" placeholder="Describe the property..."></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Price ($)</label>
                                <input type="number" class="form-control" id="prop-price" required>
                            </div>
                            <div class="form-group">
                                <label>Property Type</label>
                                <select class="form-control" id="prop-type" required>
                                    <option value="HOUSE">House</option>
                                    <option value="APARTMENT">Apartment</option>
                                    <option value="CONDO">Condo</option>
                                    <option value="TOWNHOUSE">Townhouse</option>
                                    <option value="LAND">Land</option>
                                    <option value="COMMERCIAL">Commercial</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Location</h4>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" class="form-control" id="prop-address" required placeholder="123 Main St">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" class="form-control" id="prop-city" required>
                            </div>
                            <div class="form-group">
                                <label>State</label>
                                <input type="text" class="form-control" id="prop-state" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Zip Code</label>
                            <input type="text" class="form-control" id="prop-zip" placeholder="10001">
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Features</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Bedrooms</label>
                                <input type="number" class="form-control" id="prop-beds" required min="0">
                            </div>
                            <div class="form-group">
                                <label>Bathrooms</label>
                                <input type="number" class="form-control" id="prop-baths" required min="0">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Area (sqft)</label>
                                <input type="number" class="form-control" id="prop-area">
                            </div>
                            <div class="form-group">
                                <label>Year Built</label>
                                <input type="number" class="form-control" id="prop-year">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Parking Spaces</label>
                            <input type="number" class="form-control" id="prop-parking" min="0" value="0">
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Amenities</h4>
                        <div class="amenities-grid" id="amenities-grid">
                            <label class="amenity-checkbox"><input type="checkbox" value="Swimming Pool"> Swimming Pool</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Garden"> Garden</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Garage"> Garage</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Gym"> Gym</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Security"> Security</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Laundry"> Laundry</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Air Conditioning"> Air Conditioning</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Balcony"> Balcony</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Fireplace"> Fireplace</label>
                            <label class="amenity-checkbox"><input type="checkbox" value="Pet Friendly"> Pet Friendly</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" id="submit-property-btn">Publish Property</button>
                </form>
            </div>
        </div>

        <!-- Inquiries Tab -->
        <div class="tab-content" id="tab-inquiries">
            <div id="inquiries-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 RealEstate. All rights reserved.</div>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/agent-dashboard.js"></script>
</body>
</html>
